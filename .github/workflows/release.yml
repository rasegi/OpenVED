name: Release

# Builds the macOS DMG and Windows MSI and, on a version tag, publishes them as
# a GitHub Release. The build jobs reuse the same scripts that build locally
# (scripts/build-macos.sh, scripts/build-windows.ps1), so CI and local stay in
# sync.
#
#   - push a tag  v1.2.3   -> build both installers + create the release
#   - "Run workflow" button -> build both installers only (artifacts, no release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Pin the Qt version used on Windows (install-qt-action). macOS uses Homebrew Qt.
env:
  QT_VERSION: "6.9.3"

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (Homebrew Qt + FreeType/HarfBuzz)
        run: brew install qt freetype harfbuzz ninja

      - name: Build DMG
        run: ./scripts/build-macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/release/*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (official, msvc2022_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Install FreeType + HarfBuzz (vcpkg, static triplet)
        shell: pwsh
        # Run from the vcpkg root (NOT the repo) so vcpkg stays in classic mode.
        # In the repo dir it would see vcpkg.json, switch to manifest mode and
        # reject the package arguments. build-windows.ps1 then consumes the
        # result via VcpkgRoot\installed\x64-windows-static (VCPKG_MANIFEST_MODE=OFF).
        run: |
          Set-Location $env:VCPKG_INSTALLATION_ROOT
          ./vcpkg install freetype harfbuzz --triplet x64-windows-static

      - name: Build MSI
        shell: pwsh
        run: |
          $vsRoot = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          if (-not (Test-Path $vsRoot)) {
            $vsRoot = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -latest -products * -property installationPath
          }
          ./scripts/build-windows.ps1 `
            -QtDir "$env:QT_ROOT_DIR" `
            -VcpkgRoot "$env:VCPKG_INSTALLATION_ROOT" `
            -VsRoot "$vsRoot" `
            -Triplet "x64-windows-static"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: build/release-win/*.msi
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Only on a version tag: gather both installers into a GitHub Release.
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos-dmg/*.dmg
            dist/windows-msi/*.msi
          # Tags containing a hyphen (v0.2.0-beta.1) are marked as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
